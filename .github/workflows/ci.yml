name: lid Research CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests (CPU — no GPU required)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install numpy scipy scikit-learn pytest pytest-cov

      - name: Run core unit tests (numpy, no torch)
        run: |
          pytest tests/test_metrics_np.py -v --tb=short \
                 --cov=lid --cov-report=term-missing

      - name: Verify all degenerate cases pass
        run: |
          pytest tests/test_metrics_np.py::TestDegenerateZeroPerturbation \
                 tests/test_metrics_np.py::TestDeterminism -v

  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install flake8
      - run: flake8 lid/ baselines/ evaluation/ --max-line-length=100 --ignore=E501,W503
